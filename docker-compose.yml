services:
  web:
    build:
      context: .
      args:
        # NEXT_PUBLIC_* é embutido no build. Defina no .env (ou exporte) para
        # apontar a outra API; cai no backend padrão se não informado.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://150.162.235.82:3004/api/v1}
    image: firmo-frontend:latest
    container_name: firmo-frontend
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
    restart: unless-stopped
